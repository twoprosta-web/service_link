<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <!-- Статистика (график) -->
    <symbol id="icon-stats" viewBox="0 0 24 24">
        <rect x="3" y="14" width="4" height="7" fill="currentColor"/>
        <rect x="10" y="9" width="4" height="12" fill="currentColor"/>
        <rect x="17" y="4" width="4" height="17" fill="currentColor"/>
    </symbol>

    <!-- Защита (щит) -->
    <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M12 8V16" stroke="currentColor" stroke-width="2"/>
        <path d="M8 12H16" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- QR-код -->
    <symbol id="icon-qr" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" fill="currentColor"/>
        <rect x="14" y="3" width="7" height="7" fill="currentColor"/>
        <rect x="3" y="14" width="7" height="7" fill="currentColor"/>
        <path d="M14 14H21V21H17" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M17 17H21" stroke="currentColor" stroke-width="2"/>
        <path d="M14 21H21" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Скорость (ракета) -->
    <symbol id="icon-rocket" viewBox="0 0 24 24">
        <path d="M12 2C8 6 5 11 5 14C5 16 6 18 8 19C10 20 12 20 14 19C16 18 17 16 17 14C17 11 14 6 12 2Z" fill="currentColor" opacity="0.8"/>
        <circle cx="12" cy="14" r="2" fill="white"/>
        <path d="M8 18L5 21" stroke="currentColor" stroke-width="2"/>
        <path d="M16 18L19 21" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Глобус -->
    <symbol id="icon-globe" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
        <ellipse cx="12" cy="12" rx="4" ry="9" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2"/>
    </symbol>
</svg>