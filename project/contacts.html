<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="blob"></div>
    <div class="blob2"></div>

    <header class="header glass">
        <div class="container flex-header">
            <div class="logo"><span>Link</span></div>
            <a href="index.html" class="btn btn-blur">На главную</a>
        </div>
    </header>

    <div class="container" style="margin-top: 60px;">
        <h1 style="text-align: center; margin-bottom: 40px;">Свяжитесь с нами</h1>
        
        <div class="contact-grid">
            <div class="info-side">
                <div class="glass card">
                    <h3>Наши контакты</h3>
                    <p>Есть вопросы по сервису? Мы ответим максимально быстро!</p>
                </div>

                <div class="contact-item">
                    <picture>
                        <source srcset="assets/images/location.webp" type="image/webp">
                        <img src="assets/images/location.png" alt="Адрес" class="contact-icon" loading="lazy" width="40" height="40">
                    </picture>
                    <div>
                        <strong>Адрес:</strong>
                        <p>г. Реутов, ул. Юбилейная, д. 12</p>
                    </div>
                </div>

                <div class="contact-item">
                    <picture>
                        <source srcset="assets/images/email.webp" type="image/webp">
                        <img src="assets/images/email.png" alt="Email" class="contact-icon" loading="lazy" width="40" height="40">
                    </picture>
                    <div>
                        <strong>Email:</strong>
                        <p>support247@mail.ru</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon-bg telefon-icon"></div>
                    <div>
                        <strong>Телефон:</strong>
                        <p>+7 (999) 000-00-00</p>
                    </div>
                </div>
            </div>

            <div class="glass card">
                <form class="v-form">
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="email" placeholder="Ваш Email" required>
                    <textarea rows="5" placeholder="Ваш вопрос..." required></textarea>
                    
                    <label class="checkbox-group">
                        <input type="checkbox" required>
                        <span>Я согласен на обработку данных</span>
                    </label>
                    
                    <button type="submit" class="btn btn-grad full-w">Отправить сообщение</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container" style="text-align: center;">
            <p>© 2023 Link. Страница контактов.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
